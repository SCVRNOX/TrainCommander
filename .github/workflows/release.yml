# .github/workflows/build_release.yml

name: Build and Release TrainCommander

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch
  tags:
    # This correctly triggers the workflow when a tag matching vX.Y.Z is pushed
    - 'v[0-9]*.[0-9]*.[0-9]*' 

jobs:
  build_and_test:
    runs-on: windows-latest # Use a Windows runner matching your local OS
    steps:
      # Step 1: Checkout the code, ensuring we get the exact tagged version
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history to ensure tags are available

      # Step 2: Setup environment (If needed)
      - name: Install Dependencies/Tools
        run: |
          echo "Setting up build environment..."
          # Add any necessary setup commands here (e.g., installing vcpkg dependencies)

      # Step 3: Build the Project
      - name: Build DLL Artifact
        run: |
          # Use MSBuild with explicit parameters to match local settings
          msbuild TrainCommander.vcxproj /p:Configuration=Release /p:Platform=x64
        env:
          # Pass any necessary environment variables here (e.g., API keys, paths)

      # Step 4: Artifact Upload (Crucial for version control)
      - name: Upload DLL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrainCommander-DLL-${{ github.ref_name }} # Names the artifact based on the tag/branch
          path: x64/TrainCommander.dll
